name: Sync with rulesync releases

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get latest rulesync release
        id: get-release
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/dyoshikawa/rulesync/releases/latest | jq -r '.tag_name // empty')
          echo "latest=$LATEST_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Latest rulesync release: $LATEST_RELEASE"

      - name: Check if already synced
        id: check-sync
        run: |
          LATEST="${{ steps.get-release.outputs.latest }}"
          CURRENT=$(cat .rulesync-version 2>/dev/null || echo "")

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already synced to $LATEST"
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "Needs sync: $CURRENT -> $LATEST"
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Download rulesync binaries
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          mkdir -p tools/rulesync
          
          # Download all platform binaries
          PLATFORMS=("linux-x64" "osx-x64" "osx-arm64" "win-x64")
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            echo "Downloading rulesync $VERSION for $PLATFORM..."
            curl -L -o "tools/rulesync/rulesync-${PLATFORM}.zip" \
              "https://github.com/dyoshikawa/rulesync/releases/download/${VERSION}/rulesync-${PLATFORM}.zip"
          done
          
          echo "Downloaded all platform binaries"

      - name: Extract and organize binaries
        if: steps.check-sync.outputs.needs_sync == 'true'
        run: |
          cd tools/rulesync
          
          # Extract each platform
          for ZIP in *.zip; do
            PLATFORM=$(basename "$ZIP" .zip)
            mkdir -p "$PLATFORM"
            unzip -o "$ZIP" -d "$PLATFORM"
            rm "$ZIP"
          done
          
          # Make Unix binaries executable
          chmod +x linux-x64/rulesync osx-x64/rulesync osx-arm64/rulesync 2>/dev/null || true
          
          cd ../..
          echo "Organized binaries in tools/rulesync/"

      - name: Update submodule to matching tag
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          cd rulesync
          git fetch origin tag "$VERSION"
          git checkout "$VERSION"
          cd ..

      - name: Update version in Directory.Build.props
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          VERSION_NUMBER="${VERSION#v}"

          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION_NUMBER<\/Version>/" Directory.Build.props
          sed -i "s/<VersionPrefix>.*<\/VersionPrefix>/<VersionPrefix>$VERSION_NUMBER<\/VersionPrefix>/" Directory.Build.props

          echo "$VERSION" > .rulesync-version

          echo "Updated version to $VERSION_NUMBER"

      - name: Commit, tag and push
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rulesync tools/rulesync Directory.Build.props .rulesync-version
          git commit -m "chore: sync with rulesync $VERSION"

          # Delete tag if exists (local and remote)
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -d "$VERSION"
          fi
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            git push --delete origin "$VERSION"
          fi

          git tag "$VERSION"
          git push origin main
          git push origin "$VERSION"

      - name: Trigger CI workflow
        if: steps.check-sync.outputs.needs_sync == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: sync-complete
          client-payload: '{"version": "${{ steps.check-sync.outputs.version }}"}'
