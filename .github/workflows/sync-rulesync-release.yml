name: Sync with rulesync releases

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      override_version:
        description: 'Force sync and override existing version (delete tag and release)'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          # lfs: disabled - binaries downloaded at runtime

      - name: Get latest rulesync release
        id: get-release
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/dyoshikawa/rulesync/releases/latest | jq -r '.tag_name // empty')
          echo "latest=$LATEST_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Latest rulesync release: $LATEST_RELEASE"

      - name: Check if already synced
        id: check-sync
        run: |
          OVERRIDE="${{ github.event.inputs.override_version }}"
          LATEST="${{ steps.get-release.outputs.latest }}"
          CURRENT=$(cat .rulesync-version 2>/dev/null || echo "")

          # Handle override mode
          if [ -n "$OVERRIDE" ]; then
            echo "Override requested for version: $OVERRIDE"
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "version=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "is_override=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already synced to $LATEST"
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "Needs sync: $CURRENT -> $LATEST"
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "is_override=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodule to matching tag
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          cd rulesync
          git fetch origin tag "$VERSION"
          git checkout "$VERSION"
          cd ..

      - name: Update version in Directory.Build.props
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          VERSION_NUMBER="${VERSION#v}"

          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION_NUMBER<\/Version>/" Directory.Build.props
          sed -i "s/<VersionPrefix>.*<\/VersionPrefix>/<VersionPrefix>$VERSION_NUMBER<\/VersionPrefix>/" Directory.Build.props

          echo "$VERSION" > .rulesync-version

          echo "Updated version to $VERSION_NUMBER"

      - name: Delete existing release (if override)
        if: steps.check-sync.outputs.needs_sync == 'true' && steps.check-sync.outputs.is_override == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting existing release and tag for $VERSION (override mode)..."
          
          # Delete GitHub release if exists
          if gh release view "$VERSION" &>/dev/null; then
            echo "Deleting release $VERSION..."
            gh release delete "$VERSION" --yes
          fi
          
          # Delete local tag if exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Deleting local tag $VERSION..."
            git tag -d "$VERSION"
          fi
          
          # Delete remote tag if exists
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Deleting remote tag $VERSION..."
            git push --delete origin "$VERSION"
          fi

      - name: Commit, tag and push
        if: steps.check-sync.outputs.needs_sync == 'true'
        env:
          VERSION: ${{ steps.check-sync.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Note: Binaries are downloaded at runtime, not stored in repo
          git add rulesync Directory.Build.props .rulesync-version
          git commit -m "chore: sync with rulesync $VERSION" || echo "Commit may be empty"

          # Pull latest changes to avoid race conditions
          git pull --rebase origin main

          # Delete tag if exists (local and remote) - for non-override mode
          if [ "${{ steps.check-sync.outputs.is_override }}" != "true" ]; then
            if git rev-parse "$VERSION" >/dev/null 2>&1; then
              git tag -d "$VERSION"
            fi
            if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
              git push --delete origin "$VERSION"
            fi
          fi

          git tag "$VERSION"
          git push origin main
          git push origin "$VERSION"

      - name: Trigger CI workflow
        if: steps.check-sync.outputs.needs_sync == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: sync-complete
          client-payload: '{"version": "${{ steps.check-sync.outputs.version }}"}'
