name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches: [main]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3). Leave empty to auto-generate from Directory.Build.props'
        required: false
        default: ''
      override_stable:
        description: 'Override stable release (force publish even if version exists on NuGet/GitHub)'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip running tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if CI succeeded (for workflow_run triggers) or if triggered by tag/manually
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
          lfs: true

      - name: Determine version
        id: version
        run: |
          # Check if manual version was provided via workflow_dispatch
          MANUAL_VERSION="${{ github.event.inputs.version }}"
          OVERRIDE_STABLE="${{ github.event.inputs.override_stable }}"
          
          if [ -n "$MANUAL_VERSION" ]; then
            # Use manually specified version
            VERSION="$MANUAL_VERSION"
            # Determine if prerelease based on version string
            if [[ "$VERSION" == *-alpha* ]] || [[ "$VERSION" == *-beta* ]] || [[ "$VERSION" == *-rc* ]]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
            echo "override_stable=$OVERRIDE_STABLE" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push - use the tag version
            VERSION="${{ github.ref_name }}"
            IS_PRERELEASE=false
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "override_stable=false" >> "$GITHUB_OUTPUT"
          else
            # Get base version from Directory.Build.props
            BASE_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
            # Main branch push - create rc version
            # Count existing rc releases for this version
            RC_COUNT=$(git tag -l "v${BASE_VERSION}-rc*" | wc -l)
            RC_NUM=$((RC_COUNT + 1))
            VERSION="v${BASE_VERSION}-rc.${RC_NUM}"
            IS_PRERELEASE=true
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "override_stable=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Base version: $BASE_VERSION"
          echo "Release version: $VERSION"
          echo "Is prerelease: $IS_PRERELEASE"
          echo "Override stable: $OVERRIDE_STABLE"

      - name: Update version for prerelease
        if: steps.version.outputs.is_prerelease == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUMBER="${VERSION#v}"
          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION_NUMBER<\/Version>/" Directory.Build.props
          sed -i "s/<VersionPrefix>.*<\/VersionPrefix>/<VersionPrefix>$VERSION_NUMBER<\/VersionPrefix>/" Directory.Build.props
          echo "Updated version to $VERSION_NUMBER"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Verify committed binaries exist
        run: |
          ls -la tools/rulesync/*/rulesync*
          echo "Using committed binaries from tools/rulesync/"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack (full variant with native executables)
        run: dotnet pack src/RuleSync.Sdk.DotNet/RuleSync.Sdk.DotNet.csproj --configuration Release --no-build --output ./nupkg

      - name: Pack (slim variant without native executables)
        run: dotnet pack src/RuleSync.Sdk.DotNet/RuleSync.Sdk.DotNet.Slim.csproj --configuration Release --no-build --output ./nupkg

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/*.nupkg
          retention-days: 30

      - name: Upload native executables
        uses: actions/upload-artifact@v4
        with:
          name: native-executables
          path: native-binaries/**
          retention-days: 30

      - name: Delete existing NuGet packages (if override enabled)
        if: ${{ steps.version.outputs.override_stable == 'true' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUMBER="${VERSION#v}"
          
          # List of packages to delete
          PACKAGES=(
            "RuleSync.Sdk.DotNet"
            "RuleSync.Sdk.DotNet.Slim"
          )
          
          for PACKAGE in "${PACKAGES[@]}"; do
            echo "Attempting to delete $PACKAGE version $VERSION_NUMBER from NuGet..."
            # Try to delete the package version (NuGet doesn't support delete via API for unlisting)
            # We'll use unlist instead which hides the package
            curl -X DELETE \
              -H "X-NuGet-ApiKey: $NUGET_API_KEY" \
              "https://api.nuget.org/v3/package/$PACKAGE/$VERSION_NUMBER" \
              || echo "Note: Package $PACKAGE $VERSION_NUMBER may not exist or cannot be deleted via API"
          done
          
          echo "Note: NuGet packages cannot be fully deleted, only unlisted. The new publish will succeed with --skip-duplicate."

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ "${{ steps.version.outputs.override_stable }}" == "true" ]; then
            echo "Publishing with override enabled (will replace existing packages)..."
            dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          fi

      - name: Fetch rulesync release notes
        id: rulesync-notes
        run: |
          RULESYNC_VERSION=$(cat .rulesync-version 2>/dev/null || echo '')
          if [ -n "$RULESYNC_VERSION" ]; then
            curl -s "https://api.github.com/repos/dyoshikawa/rulesync/releases/tags/$RULESYNC_VERSION" | jq -r '.body // "No release notes available"' > rulesync-notes.md
          else
            echo "Synced with rulesync" > rulesync-notes.md
          fi

      - name: Create release notes
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUMBER="${VERSION#v}"
          RULESYNC_VERSION=$(cat .rulesync-version 2>/dev/null || echo 'unknown')

          echo "## RuleSync Release Notes" > release-notes.md
          echo "" >> release-notes.md
          cat rulesync-notes.md >> release-notes.md
          echo "" >> release-notes.md
          echo "## .NET SDK Packages" >> release-notes.md
          echo "" >> release-notes.md
          echo "- **NuGet**: https://www.nuget.org/packages/RuleSync.Sdk.DotNet/$VERSION_NUMBER" >> release-notes.md
          echo "- **GitHub Packages**: https://github.com/$REPO_OWNER/rulesync-dotnet/pkgs/nuget/RuleSync.Sdk.DotNet" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Native Executables" >> release-notes.md
          echo "" >> release-notes.md
          echo "This release includes standalone native executables (no Node.js required):" >> release-notes.md
          echo "- \`linux-x64/rulesync\` (~105 MB)" >> release-notes.md
          echo "- \`linux-arm64/rulesync\` (~98 MB)" >> release-notes.md
          echo "- \`darwin-x64/rulesync\` (~69 MB)" >> release-notes.md
          echo "- \`darwin-arm64/rulesync\` (~64 MB)" >> release-notes.md
          echo "- \`windows-x64/rulesync.exe\` (~116 MB)" >> release-notes.md
          echo "" >> release-notes.md
          echo "The NuGet package automatically uses the appropriate native executable for your platform." >> release-notes.md
          echo "" >> release-notes.md
          echo "## Package Variants" >> release-notes.md
          echo "" >> release-notes.md
          echo "- **RuleSync.Sdk.DotNet** (~110MB): Includes native executables for all platforms. No Node.js required." >> release-notes.md
          echo "- **RuleSync.Sdk.DotNet.Slim** (~2MB): JS-only variant. Requires Node.js installed on target machine." >> release-notes.md
          echo "" >> release-notes.md
          echo "Synced with rulesync $RULESYNC_VERSION" >> release-notes.md

      - name: Delete existing GitHub Release (if override enabled)
        if: ${{ steps.version.outputs.override_stable == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          echo "Checking for existing release $VERSION..."
          if gh release view "$VERSION" &>/dev/null; then
            echo "Deleting existing release $VERSION..."
            gh release delete "$VERSION" --yes
            echo "Release $VERSION deleted."
          else
            echo "No existing release $VERSION found."
          fi
          
          # Also delete and recreate the tag if it exists
          if git rev-parse "$VERSION" &>/dev/null; then
            echo "Deleting existing tag $VERSION..."
            git push origin --delete "$VERSION" || true
            git tag -d "$VERSION" || true
            echo "Tag $VERSION deleted."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"
          OVERRIDE="${{ steps.version.outputs.override_stable }}"

          if [ "$IS_PRERELEASE" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi

          if [ "$OVERRIDE" == "true" ]; then
            echo "Creating release with override enabled..."
          fi

          gh release create "$VERSION" \
            ./nupkg/*.nupkg \
            --title "$VERSION" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push ./nupkg/*.nupkg --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
